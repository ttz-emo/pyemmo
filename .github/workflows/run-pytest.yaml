name: Run pytest

on:
    push:
        branches:
            - master

jobs:
    test:
        name: Run Tests With Python 3.13
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: '3.13'
            - run: python --version
            - run: python -m pip install -r requirements.txt -r requirements-tests.txt
            - run: pytest
