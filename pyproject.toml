[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

# tox config
# [tool.tox]
# envlist = ["py37", "py38", "py39", "py310"]
# [tool.tox.envlist]
# envs = [
#     "py37",
#     "py38",
#     "py39",
#     "py310",
# ] # "py311" not compatible with pyleecan yet
# [tool.tox.testenv]
# deps = ["pytest", "pytest_check", "hypothesis"]
# commands = ["pytest tests\\script tests\\functions tests\\api"]
# setenv = ["PATH = {env:PATH}{:}/."]
[tool.tox]
legacy_tox_ini = """
[tox]
envlist = py36, py37, py38, py39
; envlist = py3913
; skipsdist = true

[testenv]
deps =
        pytest
        pytest_check
        hypothesis
commands = pytest tests\\script tests\\functions tests\\api
setenv =
        PATH = {env:PATH}{:}/.
"""

[project]
name = "pyemmo"
authors = [
    { name = "AG-EM TTZ-EMO" },
    { name = "Max Schuler", email = "max.schuler@thws.de" },
    { name = "Sasithon Koenig" },
]
maintainers = [{ name = "Max Schuler", email = "max.schuler@thws.de" }]
readme = "README.md"
description = "PyEMMO is a interface for modeling electrical machines in the open-source FEA software Onelab"
urls = { Repository = "https://gitlab.ttz-emo.thws.de/ag-em/pyemmo" }
requires-python = ">=3.6"
license = { file = "LICENSE" }
keywords = [
    "electrical machine",
    "simulation",
    "onelab",
    "getdp",
    "gmsh",
    "fea",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
]
# dependencies = []
# try to find version and dependencies automatically
dynamic = ["version", "dependencies"]

# Optional dependencies
[project.optional-dependencies]
GIT = ['GitPython; python_version>="3.7"'] # requires python>=3.7 since 3.1.23!

# find packages in source directory
[tool.setuptools.packages.find]
where = ["."]
include = ["pyemmo*"]
# exclude = ["additional*"]`
namespaces = false

[tool.black]
line-length = 79

[tool.pytest.ini_options]
testpaths = ["tests"]
log_cli = 1
log_cli_level = "INFO"
# log_cli_format = "%(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)"
# log_cli_date_format = "%Y-%m-%d %H:%M:%S"

[tool.bandit]
skips = ["B311", "B404", "B603"]
# B311: using random standard libary to create plot colors -> could be resolved
# by predefining colors or just using balck or blue... TODO
# B404: We need subprocess to start simulations
# B603: subprocess mit "shell = False" - Dies minimiert das Risiko von
# Shell-Injection-Angriffen und sollte bevorzugt verwendet werden (gegenüber
# "shell = True").
